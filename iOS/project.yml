name: Surfjournal
options:
  bundleIdPrefix: com.shimondeitel.surfjournal
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Surfjournal:
    type: application
    platform: iOS
    sources:
      - path: Surfjournal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.surfjournal
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Surfjournal/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SurfjournalTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SurfjournalTests
      - path: Surfjournal.storekit
    dependencies:
      - target: Surfjournal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.surfjournal.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SurfjournalUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SurfjournalUITests
    dependencies:
      - target: Surfjournal
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.surfjournal.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Surfjournal:
    build:
      targets:
        Surfjournal: all
        SurfjournalTests: [test]
        SurfjournalUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Surfjournal.storekit
    test:
      config: Debug
      storeKitConfiguration: Surfjournal.storekit
      targets:
        - SurfjournalTests
        - SurfjournalUITests
    archive:
      config: Release
